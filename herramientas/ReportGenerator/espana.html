<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generador de Comandos — España</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <script defer src="../../assets/js/utils.js"></script>
  <script defer src="../../assets/js/espana.js"></script>
</head>

<body>
  <header>
    <h1>Generador de Comandos — España</h1>
    <div class="header-top">
      <a href="../../index.html" class="btn secondary">← Volver al índice</a>
      <a href="../../faq/faq.html" class="btn secondary">Guía de usuario</a>
    </div>
  </header>

  <main class="tool-layout">
    <section>
      <form id="form">
        <fieldset>
          <legend>Parámetros</legend>

          <div class="form-row">
            <div>
              <label for="periodicidad">Periodicidad</label>
              <select id="periodicidad">
                <option value="Horario">Horario</option>
                <option value="Diario">Diario</option>
                <option value="Mensual">Mensual</option>
              </select>
            </div>
            <div>
              <label for="tipo">Tipo de fichero</label>
              <select id="tipo"></select>
            </div>
          </div>

          <div class="form-row">
            <div>
              <label for="tz">Zona horaria</label>
              <select id="tz">
                <option value="+01:00">+01:00 // Horario Invierno</option>
                <option value="+02:00" selected>+02:00 // Horario Verano</option>
              </select>
            </div>
            <div>
              <label for="exe">Ruta ejecutable</label>
              <div class="exe-row">
                <input id="exe" type="text"
                  value="C:\services\services_ics\ReportGeneratorManual\MT.Ics.SpainAndColombiaReportGenerator.exe" />
                <button type="button" id="btnRestoreExe" class="btn-restore" title="Restaurar ruta original">↩</button>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div>
              <label for="inicio">Fecha inicio</label>
              <input id="inicio" type="date" />
              <div class="date-shortcuts">
                <button type="button" data-date-shortcut data-target="inicio" data-offset="0">Hoy</button>
                <button type="button" data-date-shortcut data-target="inicio" data-offset="-1">Ayer</button>
              </div>
            </div>
            <div>
              <label for="fin">Fecha fin</label>
              <input id="fin" type="date" />
              <div class="date-shortcuts">
                <button type="button" data-date-shortcut data-target="fin" data-offset="0">Hoy</button>
                <button type="button" data-date-shortcut data-target="fin" data-offset="-1">Ayer</button>
              </div>
            </div>
          </div>

          <div id="horasBox" class="form-row">
            <div>
              <label for="hstart">Hora inicio (0–23)</label>
              <input id="hstart" type="number" min="0" max="23" step="1" value="0" />
            </div>
            <div>
              <label for="hend">Hora fin (1–24)</label>
              <input id="hend" type="number" min="1" max="24" step="1" value="24" />
            </div>
          </div>

          <div id="gameBox" class="form-row hidden">
            <div>
              <label for="gametype">Game Type</label>
              <select id="gametype"></select>
            </div>
          </div>

          <div>
            <label for="comillas">Formato</label>
            <select id="comillas">
              <option value="raw">Para ejecutar por CMD</option>
              <option value="comma">Job Automático SCI - Multicomandos</option>
              <option value="nocomma">Job Automático SCI - Único comando</option>
            </select>
          </div>

          <div class="actions">
            <button type="button" class="primary" id="btnGenerate">Generar</button>
            <button type="button" id="btnCopy">Copiar</button>
            <span id="copyMsg" class="muted" style="display:none">¡Copiado!</span>
            <button type="button" id="btnClear">Limpiar</button>
            <button type="button" id="btnExport">Exportar .txt</button>
            <span id="counter" class="muted" style="font-size:12px;"></span>
          </div>
        </fieldset>

        <p class="muted" style="margin-top:12px">En <strong>Horario</strong> se generan bloques de 1 hora [inicio, fin).
          En <strong>Mensual</strong> se usa el día 1 a 00:00 del mes.</p>
      </form>
    </section>

    <section>
      <fieldset>
        <legend>Salida</legend>
        <textarea id="output" spellcheck="false" placeholder="Aquí aparecerán los comandos..."></textarea>
      </fieldset>
    </section>
  </main>
</body>

</html>
