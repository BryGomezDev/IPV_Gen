<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Comandos — DWHLoader</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <script defer src="../../assets/js/dwhloader.js"></script>
</head>

<body>
    <header>
        <h1 style="margin-bottom: 1rem;">Generador de Comandos — DWHLoader</h1>

        <div class="header-top" style="display:flex;justify-content:space-between;align-items:center;">
            <button class="btn secondary" onclick="location.href='../../Generador De Comandos SCI.html'">← Volver al índice</button>
            <button class="btn secondary" onclick="location.href='../../faq/faq.html'">Guía de usuario</button>
        </div>
    </header>


    <main>
        <!-- Panel de Parámetros -->
        <fieldset>
            <legend>Parámetros</legend>

            <!-- Periodicidad -->
            <div class="form-row">
                <div>
                    <label for="periodicidad">Periodicidad</label>
                    <input id="periodicidad" type="text" value="Diario" readonly />
                </div>
                <!-- Ruta ejecutable -->
                <div>
                    <label for="exe">Ruta ejecutable</label>
                    <input id="exe" type="text" value="java -jar ColjuegosDWHLoader.jar -e manual" readonly />
                </div>
            </div>

            <!-- Fechas -->
            <div class="form-row">
                <div>
                    <label for="inicio">Fecha inicio</label>
                    <input type="date" id="inicio">
                </div>
                <div>
                    <label for="fin">Fecha fin</label>
                    <input type="date" id="fin">
                </div>
            </div>

            <!-- Selector de tipos -->
            <div class="form-row">
                <div>
                    <label>Tipo de fichero</label>
                    <div class="multiselect">
                        <button type="button" id="tipoBtn" class="ms-trigger">Selecciona tipos…</button>
                        <div id="tipoMenu" class="ms-menu" aria-hidden="true">
                            <label><input type="checkbox" name="tipoOpt" value="player"> player</label>
                            <label><input type="checkbox" name="tipoOpt" value="opertatorIncomes">
                                opertatorIncomes</label>
                        </div>
                    </div>
                </div>
            </div>
            <div>
                <label for="comillas">Formato</label>
                <select id="comillas">
					<option value="raw">Para ejecutar por CMD </option>
                    <option value="comma">Job Automático SCI - Multicomandos </option>
                    <option value="nocomma">Job Automático SCI - Único comando </option>
                </select>
            </div>
            </div>
            </div>

            <!-- Botones -->
            <div class="actions">
                <button id="btnGenerate" class="primary">Generar</button>
                <button id="btnCopy">Copiar</button>
                <span id="copyMsg" class="muted" style="display:none;">¡Copiado!</span>
                <button id="btnClear">Limpiar</button>
            </div>

            <p class="muted"><strong>Recordemos</strong> que antes de recargar, previamente tenemos que borrar.
                Siguamos las instrucciones de la página de Confluence <a
                    href="https://orenescore.atlassian.net/wiki/spaces/SUP/pages/4075159566/ZAMBA+-+Cierre+del+mes+ICS+DWH+CUBO+LIQ+OPT+SIPLAFT#T1.3.--TAREAS-CUANDO-HAY-DIFERENCIAS"><strong>TAREAS
                        CUANDO HAY DIFERENCIAS</strong></a>.
            </p>
        </fieldset>

        <!-- Panel de Salida -->
        <fieldset>
            <legend>Salida</legend>
            <textarea id="output" placeholder="Aquí aparecerá el comando..." readonly></textarea>
        </fieldset>
    </main>
</body>

</html>
