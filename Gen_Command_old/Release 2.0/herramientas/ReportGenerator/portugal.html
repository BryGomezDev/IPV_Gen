<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generador de Comandos — Portugal</title>
  <link rel="stylesheet" href="../../assets/css/main.css">
  <script src="../../assets/js/portugal.js"></script>
</head>

<body>
  <header>
    <h1 style="margin-bottom: 1rem;">Generador de Comandos — Portugal</h1>

    <div class="header-top" style="display:flex;justify-content:space-between;align-items:center;">
      <button class="btn secondary" onclick="location.href='../../Generador De Comandos SCI.html'">← Volver al índice</button>
      <button class="btn secondary" onclick="location.href='../../faq/faq.html'">Guía de usuario</button>
    </div>
  </header>
  <main>
    <section>
      <form id="form">
        <fieldset>
          <legend>Parámetros</legend>

          <div class="form-row">
            <div>
              <label for="periodicidad">Periodicidad</label>
              <select id="periodicidad">
                <option value="Horario">Horario</option>
                <option value="Diario">Diario</option>
              </select>
            </div>
            <div>
              <label for="tipo">Tipo de fichero</label>
              <select id="tipo"></select>
            </div>
          </div>


          <div class="form-row">
            <div>
              <label for="tz">Zona horaria</label>
              <select id="tz">
                <option value="+01:00" selected>+01:00</option>
                <option value="+00:00">+00:00</option>
              </select>
            </div>
            <div>
              <label for="jar">Nombre del JAR</label>
              <input id="jar" type="text" value="portugal-reports-generator.jar" readonly />
              <!-- <div class="muted">Por si cambia el ejecutable.</div> -->
            </div>
          </div>


          <div class="form-row">
            <div>
              <label for="inicio">Fecha inicio</label>
              <input id="inicio" type="date" />
            </div>
            <div>
              <label for="fin">Fecha fin</label>
              <input id="fin" type="date" />
            </div>
          </div>


          <div id="horasBox" class="form-row">
            <div>
              <label for="hstart">Hora inicio (0–23)</label>
              <input id="hstart" type="number" min="0" max="23" step="1" value="0" />
            </div>
            <div>
              <label for="hend">Hora fin (1–24)</label>
              <input id="hend" type="number" min="1" max="24" step="1" value="24" />
            </div>
          </div>
          <div>
            <label for="comillas">Formato</label>
            <select id="comillas">
              <option value="comma">Job Automático SCI - Multicomandos </option>
              <option value="nocomma">Job Automático SCI - Único comando </option>
              <option value="raw">Para ejecutar por CMD </option>
            </select>
          </div>



          <div class="actions">
            <button type="button" class="primary" id="btnGenerate">Generar</button>
            <button type="button" id="btnCopy">Copiar</button>
            <span id="copyMsg" class="muted" style="display:none">¡Copiado!</span>
            <button type="button" id="btnClear">Limpiar</button>
          </div>
        </fieldset>


        <p class="muted" style="margin-top:12px">Nota: para <strong>Horario</strong>, el rango genera bloques [inicio,
          fin), es decir, si
          pones 0–24 cubrirá las 24 horas. En <strong>Diario</strong> se genera 00:00→24:00 por cada día.</p>
      </form>
    </section>


    <section>
      <fieldset>
        <legend>Salida</legend>
        <textarea id="output" spellcheck="false" placeholder="Aquí aparecerán los comandos..."></textarea>
    </section>
  </main>
</body>

</html>
